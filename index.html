  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    function startApp() {
    const {
      initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
      getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, deleteDoc,
      getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject
    } = window.firebaseModules;

    const Icon = ({ name, size = 24, className = "" }) => (
      <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>
    );

    // ===== 사진 게시판 (Apps Script) =====
    const PHOTO_BOARD_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyqlvFGDoP0bPNW9Xf2YcIstkFZ-5hUJgQBKlTYCUzgPYPrPv-WRfyfI9BuyvWYOn3l/exec';
    const PHOTO_DRIVE_FOLDER_URL = 'https://drive.google.com/drive/folders/1CfGsDpBbQJwtaj8efzIHe9tUoQYLCeZ4?usp=sharing';
    const isPhotoBoardUrlReady = /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(?:\?.*)?$/.test((PHOTO_BOARD_WEBAPP_URL || '').trim());

    // ===== Firebase (기존 프로젝트 그대로 사용) =====
    const firebaseConfig = {
      apiKey: "AIzaSyDrZ5KDbkfR3hDj9U0lI2VHhgzNXNE_1cU",
      authDomain: "school-debate-1.firebaseapp.com",
      projectId: "school-debate-1",
      storageBucket: "school-debate-1.firebasestorage.app",
      messagingSenderId: "711490484046",
      appId: "1:711490484046:web:1fa6e1400c1451d776101f"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 새 사이트는 새 데이터 경로 사용 (기존 데이터와 분리)
    const CLASS_LABEL = '6학년 5반';
    const CLASS_KEY = 'grade6-class5-2026';
    const TEACHER_PASSWORD = '112233';
    const HICLASS_CODE = '39458986';

    const getDataCollection = (name) => collection(db, 'classes', CLASS_KEY, name);
    const getDataDoc = (name, id) => doc(db, 'classes', CLASS_KEY, name, id);

    // ===== 레벨(등급) 시스템 : 누적 포인트 기준 =====
    const LEVELS = [
      { min: 0,    name: '새싹',   emoji: '🌱', grad: 'from-lime-400 to-green-500',    bar: 'bg-green-500' },
      { min: 100,  name: '클로버', emoji: '🍀', grad: 'from-emerald-400 to-teal-500',  bar: 'bg-teal-500' },
      { min: 300,  name: '별',     emoji: '⭐', grad: 'from-amber-400 to-orange-500',  bar: 'bg-amber-500' },
      { min: 600,  name: '불꽃',   emoji: '🔥', grad: 'from-orange-400 to-rose-500',   bar: 'bg-rose-500' },
      { min: 1000, name: '다이아', emoji: '💎', grad: 'from-sky-400 to-indigo-500',    bar: 'bg-sky-500' },
      { min: 2000, name: '왕관',   emoji: '👑', grad: 'from-violet-500 to-fuchsia-500',bar: 'bg-violet-500' },
    ];
    const getLevel = (c) => [...LEVELS].reverse().find(l => (c || 0) >= l.min) || LEVELS[0];
    const getNextLevel = (c) => LEVELS.find(l => l.min > (c || 0)) || null;

    // ===== 숫자 카운트업 =====
    const CountUp = ({ value, duration = 900 }) => {
      const [display, setDisplay] = useState(0);
      const prevRef = useRef(0);
      useEffect(() => {
        const from = prevRef.current, to = Number(value || 0);
        const start = performance.now();
        let raf;
        const step = (now) => {
          const p = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - p, 3);
          setDisplay(Math.round(from + (to - from) * eased));
          if (p < 1) raf = requestAnimationFrame(step);
          else prevRef.current = to;
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, [value]);
      return <span>{display.toLocaleString()}</span>;
    };

    // ===== 명렬표 파싱 (기존 로직 유지) =====
    const normalizeGender = (value) => {
      const token = String(value || '').trim().toLowerCase();
      if (['남','남자','남학생','m','male','boy'].includes(token)) return '남';
      if (['여','여자','여학생','f','female','girl'].includes(token)) return '여';
      return '';
    };
    const cleanStudentName = (value) => String(value || '')
      .replace(/^\s*\d+\s*[.)번:-]?\s*/, '').replace(/[()（）]/g, ' ').replace(/\s+/g, ' ').trim();
    const parseRosterText = (rawText) => {
      const raw = String(rawText || '').replace(/\r/g, '\n').trim();
      if (!raw) return [];
      const candidates = [];
      raw.split(/\n+/).forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) return;
        const commaParts = trimmed.split(/[,，;；]+/).map(p => p.trim()).filter(Boolean);
        const isPairList = commaParts.length > 2 && commaParts.length % 2 === 0 && commaParts.every((p, i) => i % 2 === 0 || normalizeGender(p));
        if (commaParts.length === 2 && normalizeGender(commaParts[1])) candidates.push(trimmed);
        else if (isPairList) { for (let i = 0; i < commaParts.length; i += 2) candidates.push(`${commaParts[i]} ${commaParts[i+1]}`); }
        else if (commaParts.length > 1) candidates.push(...commaParts);
        else candidates.push(trimmed);
      });
      const seen = new Set();
      const students = [];
      candidates.forEach((candidate) => {
        let value = candidate.replace(/^\s*\d+\s*[.)번:-]?\s*/, '').replace(/\t/g, ' ').trim();
        if (!value) return;
        if (/^(번호|순번|이름|학생명|성별)(\s|$)/.test(value) || (value.includes('이름') && value.includes('성별'))) return;
        if (normalizeGender(value)) return;
        let gender = '', name = value;
        const pairMatch = value.match(/^(.+?)[\s,/|:：-]+(남|남자|남학생|여|여자|여학생|m|M|male|female|boy|girl|f|F)$/i);
        const parenMatch = value.match(/^(.+?)[(（]\s*(남|남자|남학생|여|여자|여학생|m|M|male|female|boy|girl|f|F)\s*[)）]$/i);
        if (pairMatch) { name = pairMatch[1]; gender = normalizeGender(pairMatch[2]); }
        else if (parenMatch) { name = parenMatch[1]; gender = normalizeGender(parenMatch[2]); }
        name = cleanStudentName(name);
        if (!name || seen.has(name)) return;
        seen.add(name);
        students.push({ name, gender: gender || '미입력' });
      });
      return students;
    };
    const genPin = () => String(Math.floor(1000 + Math.random() * 9000));

    function App() {
      // ===== 공통 =====
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('points');
      const [copySuccess, setCopySuccess] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [showTeacherAuth, setShowTeacherAuth] = useState(false);
      const [isTeacher, setIsTeacher] = useState(false);
      const [teacherPwd, setTeacherPwd] = useState('');
      const [teacherError, setTeacherError] = useState('');

      // ===== 데이터 =====
      const [students, setStudents] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [links, setLinks] = useState([]);
      const [videos, setVideos] = useState([]);
      const [surveys, setSurveys] = useState([]);
      const [surveyBoards, setSurveyBoards] = useState([]);
      const [surveyResponses, setSurveyResponses] = useState([]);

      // ===== 학생 본인 조회 =====
      const [studentSession, setStudentSession] = useState(null); // student id
      const [loginName, setLoginName] = useState('');
      const [loginPin, setLoginPin] = useState('');
      const [loginError, setLoginError] = useState('');

      // ===== 선생님 포인트 관리 UI =====
      const [sortBy, setSortBy] = useState('number');
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedStudent, setSelectedStudent] = useState(null);
      const [pointModalTab, setPointModalTab] = useState('earn');
      const [amount, setAmount] = useState('');
      const [desc, setDesc] = useState('');
      const [bulkOpen, setBulkOpen] = useState(false);
      const [bulkAmount, setBulkAmount] = useState('');
      const [bulkDesc, setBulkDesc] = useState('');
      const [bulkNames, setBulkNames] = useState('');
      const [bulkFeedbackMsg, setBulkFeedbackMsg] = useState('');
      const [rosterManagerOpen, setRosterManagerOpen] = useState(false);
      const [rosterSetupText, setRosterSetupText] = useState('');
      const [rosterFeedbackMsg, setRosterFeedbackMsg] = useState('');
      const [showPins, setShowPins] = useState(false);

      // ===== 링크 / 영상 =====
      const [linkTitle, setLinkTitle] = useState('');
      const [linkUrl, setLinkUrl] = useState('');
      const [videoTitle, setVideoTitle] = useState('');
      const [uploadType, setUploadType] = useState('file');
      const [videoFile, setVideoFile] = useState(null);
      const [videoLink, setVideoLink] = useState('');
      const [uploadProgress, setUploadProgress] = useState(0);
      const fileInputRef = useRef(null);

      // ===== 설문 =====
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [formData, setFormData] = useState({ name: '', nominee: '', reason: '' });
      const [surveyErrorMsg, setSurveyErrorMsg] = useState('');
      const [surveyCreateOpen, setSurveyCreateOpen] = useState(false);
      const [surveyFeedbackMsg, setSurveyFeedbackMsg] = useState('');
      const [newSurveyForm, setNewSurveyForm] = useState({ title: '', description: '', question: '', isSecret: false });
      const [surveyAnswerForms, setSurveyAnswerForms] = useState({});

      // ===== 인증 & 리스너 =====
      useEffect(() => {
        signInAnonymously(auth).catch((err) => {
          console.log("익명 로그인 우회:", err);
          setUser({ uid: 'anonymous-user' });
        });
        const unsub = onAuthStateChanged(auth, (u) => { if (u) setUser(u); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!user) return;
        const subs = [
          onSnapshot(getDataCollection('students'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            setStudents(data);
            setSelectedStudent(prev => prev ? (data.find(s => s.id === prev.id) || null) : prev);
          }),
          onSnapshot(getDataCollection('transactions'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setTransactions(data);
          }),
          onSnapshot(getDataCollection('links'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setLinks(data);
          }),
          onSnapshot(getDataCollection('videos'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setVideos(data);
          }),
          onSnapshot(getDataCollection('surveys'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            data.sort((a, b) => b.timestamp - a.timestamp);
            setSurveys(data);
          }),
          onSnapshot(getDataCollection('surveyBoards'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            setSurveyBoards(data);
          }),
          onSnapshot(getDataCollection('surveyResponses'), (snap) => {
            const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
            data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            setSurveyResponses(data);
          }),
        ];
        return () => subs.forEach(u => u());
      }, [user]);

      // 학생 로그인 세션 복원
      useEffect(() => {
        if (students.length === 0) return;
        try {
          const saved = JSON.parse(localStorage.getItem('pb5-student') || 'null');
          if (saved && !studentSession) {
            const found = students.find(s => s.name === saved.name && s.pin === saved.pin);
            if (found) setStudentSession(found.id);
          }
        } catch (e) {}
      }, [students]);

      const myStudent = studentSession ? students.find(s => s.id === studentSession) : null;

      // ===== 공용 함수 =====
      const copyText = (text) => {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); setCopySuccess(true); setTimeout(() => setCopySuccess(false), 2500); } catch (e) {}
        document.body.removeChild(ta);
      };

      const handleTeacherLogin = (e) => {
        e.preventDefault();
        if (teacherPwd === TEACHER_PASSWORD) {
          setIsTeacher(true); setShowTeacherAuth(false); setTeacherPwd(''); setTeacherError('');
        } else setTeacherError('비밀번호가 틀렸습니다.');
      };

      // ===== 학생 본인 조회 =====
      const handleStudentLogin = (e) => {
        e.preventDefault();
        setLoginError('');
        const name = loginName.trim();
        const pin = loginPin.trim();
        if (!name || pin.length !== 4) { setLoginError('이름과 PIN 4자리를 입력해 주세요.'); return; }
        const found = students.find(s => s.name === name && s.pin === pin);
        if (!found) { setLoginError('이름 또는 PIN이 맞지 않아요. 선생님께 확인해 주세요!'); return; }
        setStudentSession(found.id);
        localStorage.setItem('pb5-student', JSON.stringify({ name: found.name, pin: found.pin }));
        setLoginName(''); setLoginPin('');
      };
      const handleStudentLogout = () => {
        setStudentSession(null);
        localStorage.removeItem('pb5-student');
      };

      // ===== 명렬표 =====
      const saveRoster = async (parsedRoster, startNumber) => {
        const studentsPath = getDataCollection('students');
        for (const [index, s] of parsedRoster.entries()) {
          await addDoc(studentsPath, {
            number: startNumber + index, name: s.name, gender: s.gender || '미입력',
            pin: genPin(), remaining: 0, cumulative: 0, createdAt: Date.now()
          });
        }
      };
      const handleInitializeClass = async () => {
        if (!isTeacher || isProcessing) return;
        const parsed = parseRosterText(rosterSetupText);
        if (parsed.length === 0) { setRosterFeedbackMsg('학생 명단을 먼저 붙여넣어 주세요. 예: 1 홍길동 남'); return; }
        setIsProcessing(true);
        setRosterFeedbackMsg('명렬표를 세팅하는 중입니다...');
        try {
          await saveRoster(parsed, 1);
          setRosterFeedbackMsg(`${parsed.length}명 세팅 완료! 각 학생의 PIN이 자동 발급되었습니다. (PIN 보기로 확인)`);
          setRosterSetupText('');
        } catch (e) { console.error(e); setRosterFeedbackMsg('세팅 중 오류가 발생했습니다.'); }
        setIsProcessing(false);
      };
      const handleAddRosterStudents = async () => {
        if (!isTeacher || isProcessing) return;
        const parsed = parseRosterText(rosterSetupText);
        if (parsed.length === 0) { setRosterFeedbackMsg('추가할 학생 명단을 입력해 주세요.'); return; }
        const existing = new Set(students.map(s => s.name));
        const fresh = parsed.filter(s => !existing.has(s.name));
        const skipped = parsed.filter(s => existing.has(s.name)).map(s => s.name);
        if (fresh.length === 0) { setRosterFeedbackMsg('추가할 새 학생이 없습니다. (같은 이름 중복 제외)'); return; }
        setIsProcessing(true);
        try {
          const maxNum = students.reduce((m, s) => Math.max(m, Number(s.number || 0)), 0);
          await saveRoster(fresh, maxNum + 1);
          setRosterFeedbackMsg(`${fresh.length}명 추가 완료${skipped.length ? ` · 중복 제외: ${skipped.join(', ')}` : ''}`);
          setRosterSetupText('');
        } catch (e) { console.error(e); setRosterFeedbackMsg('학생 추가 중 오류가 발생했습니다.'); }
        setIsProcessing(false);
      };
      const handleResetClassRoster = async () => {
        if (!isTeacher || isProcessing) return;
        if (!window.confirm('명렬표를 초기화하면 학생 목록과 포인트 내역이 모두 삭제됩니다. 계속할까요?')) return;
        if (!window.confirm('정말 초기화할까요? 복구가 어렵습니다.')) return;
        setIsProcessing(true);
        setRosterFeedbackMsg('초기화하는 중입니다...');
        try {
          for (const t of transactions) await deleteDoc(getDataDoc('transactions', t.id));
          for (const s of students) await deleteDoc(getDataDoc('students', s.id));
          setRosterFeedbackMsg('초기화 완료! 새 명단을 붙여넣어 다시 세팅하세요.');
          setSelectedStudent(null);
        } catch (e) { console.error(e); setRosterFeedbackMsg('초기화 중 오류가 발생했습니다.'); }
        setIsProcessing(false);
      };
      const copyPinList = () => {
        const sorted = [...students].sort((a, b) => Number(a.number || 9999) - Number(b.number || 9999));
        copyText(sorted.map(s => `${s.number}번 ${s.name} : ${s.pin}`).join('\n'));
      };
      const handleChangePin = async (student) => {
        const pin = window.prompt(`${student.name} 학생의 새 PIN 4자리:`, student.pin || '');
        if (pin === null) return;
        if (!/^\d{4}$/.test(pin.trim())) { alert('PIN은 숫자 4자리여야 해요.'); return; }
        await updateDoc(getDataDoc('students', student.id), { pin: pin.trim() });
      };
      const handleDeleteStudent = async (student) => {
        if (!isTeacher || isProcessing) return;
        if (!window.confirm(`"${student.name}" 학생을 삭제할까요? 포인트 내역도 함께 지워집니다.`)) return;
        setIsProcessing(true);
        try {
          const myTx = transactions.filter(t => t.studentId === student.id);
          for (const t of myTx) await deleteDoc(getDataDoc('transactions', t.id));
          await deleteDoc(getDataDoc('students', student.id));
          setSelectedStudent(null);
        } catch (e) { console.error(e); }
        setIsProcessing(false);
      };

      // ===== 포인트 적립/차감 =====
      const handleTransaction = async (type, customAmount = amount, customDesc = desc) => {
        if (!selectedStudent || isProcessing) return;
        const parsedAmount = parseInt(customAmount, 10);
        if (isNaN(parsedAmount) || parsedAmount <= 0) return;
        if (!customDesc.trim()) return;
        const currentRemaining = selectedStudent.remaining || 0;
        if (type === 'spend' && currentRemaining < parsedAmount) return;
        setIsProcessing(true);
        try {
          await addDoc(getDataCollection('transactions'), {
            studentId: selectedStudent.id, studentName: selectedStudent.name,
            type, amount: parsedAmount, description: customDesc.trim(), timestamp: Date.now()
          });
          let newRemaining = selectedStudent.remaining || 0;
          let newCumulative = selectedStudent.cumulative || 0;
          if (type === 'earn') { newRemaining += parsedAmount; newCumulative += parsedAmount; }
          else { newRemaining -= parsedAmount; }
          await updateDoc(getDataDoc('students', selectedStudent.id), { remaining: newRemaining, cumulative: newCumulative });
          setAmount(''); setDesc('');
        } catch (e) { console.error(e); }
        setIsProcessing(false);
      };
      const handleCancelTransaction = async (transaction) => {
        if (!isTeacher || isProcessing) return;
        const target = students.find(s => s.id === transaction.studentId);
        if (!target) return;
        setIsProcessing(true);
        try {
          let newRemaining = target.remaining || 0;
          let newCumulative = target.cumulative || 0;
          const cancelAmount = Number(transaction.amount || 0);
          if (transaction.type === 'earn') {
            newRemaining = Math.max(0, newRemaining - cancelAmount);
            newCumulative = Math.max(0, newCumulative - cancelAmount);
          } else newRemaining += cancelAmount;
          await updateDoc(getDataDoc('students', target.id), { remaining: newRemaining, cumulative: newCumulative });
          await deleteDoc(getDataDoc('transactions', transaction.id));
        } catch (e) { console.error(e); }
        setIsProcessing(false);
      };
      const delay = (ms) => new Promise(r => setTimeout(r, ms));
      const getNamesByGender = (gender) => students
        .filter(s => !gender || s.gender === gender)
        .sort((a, b) => (Number(a.number || 9999) - Number(b.number || 9999)) || a.name.localeCompare(b.name))
        .map(s => s.name).join(', ');
      const handleBulkEarnByNames = async () => {
        if (isProcessing) return;
        const parsedAmount = parseInt(bulkAmount, 10);
        const cleanDesc = String(bulkDesc || '').trim();
        const names = String(bulkNames || '').split(/[\n,]+/).map(n => n.trim()).filter(Boolean);
        if (isNaN(parsedAmount) || parsedAmount <= 0) { setBulkFeedbackMsg('올바른 포인트를 입력해 주세요.'); return; }
        if (!cleanDesc) { setBulkFeedbackMsg('공통 내역을 적어 주세요.'); return; }
        if (names.length === 0) { setBulkFeedbackMsg('지급할 학생 이름을 입력해 주세요.'); return; }
        const missing = names.filter(n => !students.some(s => s.name === n));
        if (missing.length > 0) { setBulkFeedbackMsg('명렬표에 없는 이름: ' + missing.join(', ')); return; }
        setIsProcessing(true);
        setBulkFeedbackMsg('일괄 지급 중입니다...');
        try {
          for (const name of names) {
            const student = students.find(s => s.name === name);
            if (!student) continue;
            await updateDoc(getDataDoc('students', student.id), {
              remaining: (student.remaining || 0) + parsedAmount,
              cumulative: (student.cumulative || 0) + parsedAmount
            });
            await addDoc(getDataCollection('transactions'), {
              studentId: student.id, studentName: student.name, type: 'earn',
              amount: parsedAmount, description: cleanDesc, timestamp: Date.now()
            });
            await delay(200);
          }
          setBulkFeedbackMsg('');
          setBulkAmount(''); setBulkDesc(''); setBulkNames(''); setBulkOpen(false);
        } catch (e) { console.error(e); setBulkFeedbackMsg('일괄 지급 중 오류가 발생했습니다.'); }
        setIsProcessing(false);
      };

      const filteredAndSortedStudents = [...students].filter(s => s.name.includes(searchTerm)).sort((a, b) => {
        if (sortBy === 'remaining') return (b.remaining || 0) - (a.remaining || 0);
        if (sortBy === 'cumulative') return (b.cumulative || 0) - (a.cumulative || 0);
        if (sortBy === 'name') return a.name.localeCompare(b.name);
        return (Number(a.number || 9999) - Number(b.number || 9999)) || a.name.localeCompare(b.name);
      });
      const openStudentModal = (student) => { setSelectedStudent(student); setPointModalTab('earn'); };
      const closeModal = () => { setSelectedStudent(null); setAmount(''); setDesc(''); };

      // ===== 영상 =====
      const handleVideoUpload = async (e) => {
        e.preventDefault();
        if (!videoTitle.trim()) return;
        setIsProcessing(true); setUploadProgress(0);
        try {
          const videosPath = getDataCollection('videos');
          if (uploadType === 'link') {
            if (!videoLink.trim()) { setIsProcessing(false); return; }
            let finalUrl = videoLink, videoFormat = 'link';
            const ytMatch = videoLink.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            if (ytMatch) { finalUrl = `https://www.youtube.com/embed/${ytMatch[1]}`; videoFormat = 'youtube'; }
            else if (!/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
            await addDoc(videosPath, { title: videoTitle, url: finalUrl, type: videoFormat, timestamp: Date.now() });
            resetVideoForm();
          } else {
            if (!videoFile || videoFile.size > 50 * 1024 * 1024) { alert('50MB 이하 영상만 업로드할 수 있어요.'); setIsProcessing(false); return; }
            const storageRef = ref(storage, `classes/${CLASS_KEY}/videos/${Date.now()}_${videoFile.name}`);
            const uploadTask = uploadBytesResumable(storageRef, videoFile);
            uploadTask.on('state_changed',
              (snap) => setUploadProgress((snap.bytesTransferred / snap.totalBytes) * 100),
              (err) => { console.error(err); setIsProcessing(false); },
              async () => {
                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                await addDoc(videosPath, { title: videoTitle, url: downloadURL, storagePath: storageRef.fullPath, type: 'file', timestamp: Date.now() });
                resetVideoForm();
              });
            return;
          }
        } catch (e) { console.error(e); }
        if (uploadType === 'link') setIsProcessing(false);
      };
      const resetVideoForm = () => {
        setVideoTitle(''); setVideoLink(''); setVideoFile(null); setUploadProgress(0); setIsProcessing(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };
      const handleDeleteVideo = async (video) => {
        try {
          if (video.type === 'file' && video.storagePath) {
            await deleteObject(ref(storage, video.storagePath)).catch(e => console.log(e));
          }
          await deleteDoc(getDataDoc('videos', video.id));
        } catch (e) { console.error(e); }
      };

      // ===== 링크 =====
      const handleAddLink = async (e) => {
        e.preventDefault();

        setIsProcessing(true);

          if (!/^https?:\/\//i.test(formatted)) formatted = 'https://' + formatted;
          await addDoc(getDataCollection('links'), { title: linkTitle, url: formatted, timestamp: Date.now() });
          setLinkTitle(''); setLinkUrl('');
        } catch (e) { console.error(e); }
        setIsProcessing(false);

        setIsProcessing(true);

            title, description: newSurveyForm.description.trim(), question,

        if (!answer) { setSurveyFeedbackMsg('답변 내용을 입력해 주세요.'); return; }
        setIsProcessing(true);
        try {
          await addDoc(getDataCollection('surveyResponses'), {
            surveyId: board.id, surveyTitle: board.title,
            name: board.isSecret ? '' : name, answer,
            isSecret: !!board.isSecret, userId: user?.uid || 'anon', timestamp: Date.now()
          });
          setSurveyAnswerForms(prev => ({ ...prev, [board.id]: { name: '', answer: '' } }));
          setSurveyFeedbackMsg('설문 응답이 저장되었습니다. 참여 고마워요! 🎉');
          setTimeout(() => setSurveyFeedbackMsg(''), 2500);
        } catch (e) { console.error(e); setSurveyFeedbackMsg('응답 저장 중 오류가 발생했습니다.'); }
        setIsProcessing(false);

      const handleDeleteSurveyBoard = async (board) => {

      const getVoteCounts = () => {

        surveys.forEach(s => {

          if (n) counts[n] = (counts[n] || 0) + 1;

      const getGenderBadgeClass = (gender) => {

        if (gender === '남') return 'bg-sky-100 text-sky-600';

      const totalCumulative = students.reduce((sum, s) => sum + (s.cumulative || 0), 0);

        { id: 'photos',  icon: 'images',               label: '사진',      on: 'from-emerald-400 to-teal-500' },
        { id: 'links',   icon: 'link',                 label: '링크',      on: 'from-sky-400 to-blue-500' },
        { id: 'survey',  icon: 'clipboard-list',       label: '설문',      on: 'from-violet-400 to-purple-500' },
        { id: 'hiclass', icon: 'mobile-screen-button', label: '하이클래스', on: 'from-slate-600 to-slate-800' },
      ];

      const myLevel = myStudent ? getLevel(myStudent.cumulative) : null;
      const myNext = myStudent ? getNextLevel(myStudent.cumulative) : null;
      const myTx = myStudent ? transactions.filter(t => t.studentId === myStudent.id) : [];

      return (
        <div className="min-h-screen font-sans text-slate-800 pb-24">

          {/* ===== 복사 토스트 ===== */}
          {copySuccess && (
            <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-5 py-2.5 rounded-full font-bold shadow-xl flex items-center z-[60] anim-pop">
              <Icon name="circle-check" size={16} className="mr-2" /> 복사되었습니다!
            </div>

          {/* ===== 헤더 ===== */}
          <header className="max-w-4xl mx-auto px-4 pt-5">
            <div className="relative overflow-hidden rounded-[2rem] bg-gradient-to-br from-indigo-500 via-violet-500 to-fuchsia-500 text-white px-7 py-9 shadow-xl shadow-indigo-200">
              <div className="absolute -top-8 -right-6 text-[110px] opacity-20 anim-float select-none">🎈</div>
              <div className="absolute bottom-2 right-24 text-4xl opacity-30 anim-float select-none" style={{animationDelay:'1s'}}>✨</div>
              <div className="absolute -bottom-4 -left-4 text-6xl opacity-20 anim-float select-none" style={{animationDelay:'.5s'}}>🌈</div>
              <div className="relative z-10 flex justify-between items-start gap-3">
                <div>
                  <div className="inline-flex items-center bg-white/20 backdrop-blur px-3 py-1 rounded-full text-xs font-bold mb-3 border border-white/30">
                    🏫 2026학년도
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-black tracking-tight mb-2">
                    <span className="text-shine">{CLASS_LABEL}</span> 우리 반 공간
                  </h1>
                  <p className="text-white/80 font-semibold text-sm sm:text-base">포인트 확인부터 영상·설문까지, 여기 다 있어요! 🚀</p>
                </div>
                {isTeacher && (
                  <span className="bg-white text-indigo-700 px-3 py-1.5 rounded-xl text-xs sm:text-sm font-black flex items-center shadow-md shrink-0">

                  </span>

          <main className="max-w-4xl mx-auto px-4 mt-5">

              {TABS.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)}
                  className={`flex flex-col items-center justify-center py-3 sm:py-4 rounded-2xl font-bold transition-all duration-200 ${

            {isTeacher && (

                      <div>
                        <label className="block text-xs font-black text-slate-500 mb-1.5">포인트 금액</label>
                        <div className="flex gap-1.5 mb-2 flex-wrap">
                          {[10, 20, 50, 100].map(v => (
                            <button key={v} type="button" onClick={() => setAmount(String(v))}
                              className="px-3.5 py-1.5 bg-white hover:bg-emerald-50 border border-emerald-200 rounded-xl font-black text-sm text-emerald-600 transition-colors">+{v}</button>
                          ))}
                        </div>
                        <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="직접 입력"
                          className="w-full border border-slate-200 rounded-2xl px-4 py-3 mb-3 font-bold focus:outline-none focus:border-emerald-400 bg-white" />
                        <label className="block text-xs font-black text-slate-500 mb-1.5">적립 사유</label>
                        <div className="flex gap-1.5 mb-2 flex-wrap">
                          {['발표', '과제 우수', '수업 태도', '봉사', '칭찬'].map(r => (
                            <button key={r} type="button" onClick={() => setDesc(r)}
                              className={`px-3 py-1.5 rounded-xl font-bold text-xs border transition-colors ${desc === r ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-500 border-slate-200 hover:border-emerald-300'}`}>{r}</button>
                          ))}
                        </div>
                        <input type="text" value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="직접 입력"
                          className="w-full border border-slate-200 rounded-2xl px-4 py-3 mb-4 font-bold focus:outline-none focus:border-emerald-400 bg-white" />
                        <button onClick={() => handleTransaction('earn')} disabled={isProcessing}
                          className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-black py-4 rounded-2xl shadow-md disabled:opacity-50">
                          🎁 포인트 지급하기
                        </button>
                      </div>
                    )}
                    {pointModalTab === 'spend' && (
                      <div>
                        <div className="bg-gradient-to-br from-rose-50 to-pink-50 border border-rose-100 rounded-3xl p-4 mb-5">
                          <h4 className="font-black text-rose-700 text-sm mb-3">🎰 400P 퀵 뽑기 보상</h4>
                          <div className="flex flex-wrap gap-1.5">
                            {['선곡권 3곡', '포인트 선물권', '옆 자리 선택', '당첨', '쉬는시간 2분'].map((item) => (
                              <button key={item} onClick={() => handleTransaction('spend', '400', `뽑기: ${item}`)}
                                disabled={isProcessing || (selectedStudent.remaining || 0) < 400}
                                className="bg-white hover:bg-rose-50 text-rose-600 border border-rose-200 text-xs font-black py-2 px-3 rounded-xl shadow-sm disabled:opacity-40 transition-colors">{item}</button>
                            ))}
                          </div>
                          {(selectedStudent.remaining || 0) < 400 && <p className="text-[11px] text-rose-400 font-bold mt-2">잔액이 400P 미만이라 뽑기를 사용할 수 없어요</p>}
                        </div>
                        <label className="block text-xs font-black text-slate-500 mb-1.5">수동 차감 금액</label>
                        <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="예: 100"
                          className="w-full border border-slate-200 rounded-2xl px-4 py-3 mb-3 font-bold focus:outline-none focus:border-rose-400 bg-white" />
                        <label className="block text-xs font-black text-slate-500 mb-1.5">사용 내역</label>
                        <input type="text" value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="예: 간식 구매"
                          className="w-full border border-slate-200 rounded-2xl px-4 py-3 mb-4 font-bold focus:outline-none focus:border-rose-400 bg-white" />
                        <button onClick={() => handleTransaction('spend')} disabled={isProcessing}
                          className="w-full bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-black py-4 rounded-2xl shadow-md disabled:opacity-50">
                          🛍️ 포인트 차감하기
                        </button>
                      </div>
                    )}
                    {pointModalTab === 'history' && (
                      <div className="space-y-2">
                        {studentTx.length === 0 ? (
                          <p className="text-center py-10 text-slate-300 font-bold">기록된 내역이 없습니다</p>
                        ) : studentTx.map((t) => (
                          <div key={t.id} className="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm">
                            <div className="flex items-center justify-between gap-3">
                              <div className="min-w-0">
                                <p className="font-bold text-slate-700 text-sm mb-0.5 truncate">{t.description}</p>
                                <p className="text-[11px] text-slate-300 font-bold">{t.timestamp ? new Date(t.timestamp).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : ''}</p>
                              </div>
                              <div className="flex items-center gap-2 shrink-0">
                                <span className={`font-black ${t.type === 'earn' ? 'text-emerald-500' : 'text-rose-500'}`}>{t.type === 'earn' ? '+' : '-'}{Number(t.amount).toLocaleString()}P</span>
                                <button type="button" onClick={() => handleCancelTransaction(t)} disabled={isProcessing}
                                  className="w-8 h-8 rounded-xl bg-rose-50 text-rose-400 border border-rose-100 hover:bg-rose-100 flex items-center justify-center disabled:opacity-40 transition-colors" title="이 내역 취소(되돌리기)">
                                  <Icon name="rotate-left" size={12} />
                                </button>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* ===== 푸터 ===== */}
          <footer className="text-center py-10 text-slate-400 text-sm relative max-w-4xl mx-auto px-4">
            <p className="font-bold">담임선생님 연락처: 010-XXXX-XXXX</p>
            <p className="mt-1 text-xs text-slate-300 font-semibold">ⓒ 2026 {CLASS_LABEL}. All rights reserved.</p>
            <div className="absolute right-5 bottom-6">
              <button onClick={() => setShowTeacherAuth(!showTeacherAuth)}
                className="w-11 h-11 text-slate-300 hover:text-indigo-500 transition-colors bg-white rounded-2xl shadow-md border border-slate-100 flex items-center justify-center">
                <Icon name={isTeacher ? "unlock" : "lock"} size={16} />
              </button>
            </div>
            {showTeacherAuth && !isTeacher && (
              <div className="absolute right-5 bottom-20 bg-white p-5 rounded-3xl shadow-2xl border border-slate-100 text-left w-64 z-50 anim-pop">
                <p className="font-black text-slate-800 mb-3 text-sm flex items-center"><Icon name="shield-halved" size={14} className="mr-2 text-indigo-500" /> 선생님 관리자 모드</p>
                <form onSubmit={handleTeacherLogin}>
                  <input type="password" value={teacherPwd} onChange={(e) => setTeacherPwd(e.target.value)} placeholder="비밀번호"
                    className="w-full border border-slate-200 rounded-2xl px-4 py-2.5 mb-2 font-bold focus:outline-none focus:border-indigo-400" />
                  {teacherError && <p className="text-xs text-rose-500 mb-2 font-bold">{teacherError}</p>}
                  <button type="submit" className="w-full bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white font-black py-3 rounded-2xl transition-colors">로그인</button>
                </form>
              </div>
            )}
            {isTeacher && showTeacherAuth && (
              <div className="absolute right-5 bottom-20 bg-white p-4 rounded-3xl shadow-2xl border border-slate-100 text-left w-56 z-50 anim-pop">
                <button onClick={() => { setIsTeacher(false); setShowTeacherAuth(false); setActiveTab('points'); }}
                  className="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-black py-3 rounded-2xl text-sm transition-colors">선생님 모드 끄기</button>
              </div>
            )}
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    }

    if (window.firebaseModules) startApp();
    else window.addEventListener('firebase-ready', startApp, { once: true });
  </script>
</body>
</html>
